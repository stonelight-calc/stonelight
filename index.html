// Service Worker
if('serviceWorker'in navigator){
  const sw=`const C='sl-v2';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./','/index.html'])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./index.html'))));});`;

}

function getTieredPrices(p){
  if(p>0&&p<10)return{retail:3650,wholesale:3550};
  if(p>=10&&p<=12)return{retail:3500,wholesale:3400};
  return{retail:3430,wholesale:3350};
}
function tierLabel(n){if(n===0)return"—";if(n<10)return"< 10 піддонів";if(n<=12)return"10–12 піддонів";return"13+ піддонів";}
function fmt(n){return Math.round(n).toLocaleString("uk-UA");}
function declPallet(n){const a=Math.abs(n),m=a%10,h=a%100;if(h>=11&&h<=14)return"піддонів";if(m===1)return"піддон";if(m>=2&&m<=4)return"піддони";return"піддонів";}
function declBag(n){const a=Math.abs(n),m=a%10,h=a%100;if(h>=11&&h<=14)return"мішків";if(m===1)return"мішок";if(m>=2&&m<=4)return"мішки";return"мішків";}
function rndPal(r){return Math.round(r);}
function resPrice(cs,def){const v=parseFloat(cs);return(!isNaN(v)&&v>0)?v:def;}

function App(){

  const [b2,setB2]=useState({enabled:false,type:"D500",width:"300",customRetail:"",customWholesale:""});

  const saveH=(next)=>{setHistory(next);saveLS(next);};

  // VC calcs
  const vc1B=BLOCKS.find(b=>b.type===b1.type&&b.width===Number(vc1.width));
  const vc1m=parseFloat(vc1.m3input)||0,vc1p=rndPal(vc1B&&vc1m>0?vc1m/vc1B.m3perPallet:0),vc1e=vc1B&&vc1p>0?+(vc1B.m3perPallet*vc1p).toFixed(3):0;
  const vc2B=BLOCKS.find(b=>b.type===b2.type&&b.width===Number(vc2.width));

  const b1W=useMemo(()=>[...new Set(BLOCKS.filter(b=>b.type===b1.type).map(b=>b.width))].sort((a,b)=>a-b),[b1.type]);
  const b1sw=b1W.includes(Number(b1.width))?b1.width:String(b1W[0]??"");
  const b1B=BLOCKS.find(b=>b.type===b1.type&&b.width===Number(b1sw));
  const b2W=useMemo(()=>[...new Set(BLOCKS.filter(b=>b.type===b2.type).map(b=>b.width))].sort((a,b)=>a-b),[b2.type]);
  const b2sw=b2W.includes(Number(b2.width))?b2.width:String(b2W[0]??"");
  const b2B=BLOCKS.find(b=>b.type===b2.type&&b.width===Number(b2sw));
  const b3W=useMemo(()=>[...new Set(BLOCKS.filter(b=>b.type===b3.type).map(b=>b.width))].sort((a,b)=>a-b),[b3.type]);
  const b3sw=b3W.includes(Number(b3.width))?b3.width:String(b3W[0]??"");
  const b3B=BLOCKS.find(b=>b.type===b3.type&&b.width===Number(b3sw));

  const b1m=vc1e,b1p=vc1p,b2m=vc2e,b2p=vc2p,b3m=vc3e,b3p=vc3p;

  // Tier
  const totPal=(b1.enabled?b1p:0)+(b2.enabled?b2p:0)+(b3.enabled?b3p:0);
  const tiered=getTieredPrices(totPal);
  const b1r=resPrice(b1.customRetail,tiered.retail),b1w=resPrice(b1.customWholesale,tiered.wholesale);
  const b2r=resPrice(b2.customRetail,tiered.retail),b2w=resPrice(b2.customWholesale,tiered.wholesale);
  const b3r=resPrice(b3.customRetail,tiered.retail),b3w=resPrice(b3.customWholesale,tiered.wholesale);

  // UB
  const ubH=[...new Set(U_BLOCKS.map(b=>b.height))].sort((a,b)=>a-b);
  const ubWH=[...new Set(U_BLOCKS.filter(b=>String(b.height)===ub.height).map(b=>b.width))].sort((a,b)=>a-b);
  const ubBl=U_BLOCKS.find(b=>String(b.width)===ub.width&&String(b.height)===ub.height);
  const ubQ=parseFloat(ub.qty)||0,ubR=resPrice(ub.customRetail,ubBl?.price??0),ubW=resPrice(ub.customWholesale,ubBl?.wholesalePrice??0);

  // Adh
  const adhO=ADHESIVES.find(a=>a.id===adh.adhesiveId)||ADHESIVES[0];
  const totM3=(b1.enabled?b1m:0)+(b2.enabled?b2m:0)+(b3.enabled?b3m:0);
  const adhAuto=totM3>0?Math.ceil(totM3):0;
  const adhQ=adhQtyOvr!==""?(parseFloat(adhQtyOvr)||0):adhAuto;
  const adhR=resPrice(adh.customRetail,adhO.retailPrice),adhW=resPrice(adh.customWholesale,adhO.wholesalePrice);
  const delivN=parseFloat(delivCost)||0;

  // Costs
  const fullBlk=(b1.enabled&&b1B?b1r*b1m:0)+(b2.enabled&&b2B?b2r*b2m:0)+(b3.enabled&&b3B?b3r*b3m:0)+(ub.enabled&&ubBl?ubR*ubQ:0);
  const fullTotal=fullBlk+(adh.enabled?adhR*adhQ:0)+delivN;
  const whlBlk=(b1.enabled&&b1B?b1w*b1m:0)+(b2.enabled&&b2B?b2w*b2m:0)+(b3.enabled&&b3B?b3w*b3m:0)+(ub.enabled&&ubBl?ubW*ubQ:0);
  const whlTotal=whlBlk+(adh.enabled?adhW*adhQ:0)+delivN;
  const hasAny=b1.enabled||b2.enabled||b3.enabled||ub.enabled||adh.enabled;
  const r10=(n)=>{const u=Math.round(n)%10,ba=Math.round(n)-u;return u>=8?ba+10:ba;};
  const fullRnd=r10(fullTotal);
  const gasoActive=[(b1.enabled&&b1p>0),(b2.enabled&&b2p>0),(b3.enabled&&b3p>0)].filter(Boolean).length;
  const totGasoM3=+((b1.enabled&&b1p>0?b1m:0)+(b2.enabled&&b2p>0?b2m:0)+(b3.enabled&&b3p>0?b3m:0)).toFixed(3);

  // Text builders
  const bfull=()=>{
    const L=[];L.push("Виробник Стоунлайт");L.push("");L.push(delivCity);L.push("");let n=1;
    if(b1.enabled&&b1B&&b1p>0){L.push(`${n}). ${b1B.width}x${b1B.height}x${b1B.length} мм ${b1.type} - ${b1m} м³ або ${b1p} ${declPallet(b1p)}`);L.push(`- Ціна газобетонного блоку - ${fmt(b1r)} грн/м³`);n++;}
    if(b2.enabled&&b2B&&b2p>0){L.push(`${n}). ${b2B.width}x${b2B.height}x${b2B.length} мм ${b2.type} - ${b2m} м³ або ${b2p} ${declPallet(b2p)}`);L.push(`- Ціна газобетонного блоку - ${fmt(b2r)} грн/м³`);n++;}
    if(b3.enabled&&b3B&&b3p>0){L.push(`${n}). ${b3B.width}x${b3B.height}x${b3B.length} мм ${b3.type} - ${b3m} м³ або ${b3p} ${declPallet(b3p)}`);L.push(`- Ціна газобетонного блоку - ${fmt(b3r)} грн/м³`);n++;}
    if(ub.enabled&&ubBl&&ubQ>0){L.push(`${n}). U-блок ${ubBl.width}x${ubBl.height}x${ubBl.length} мм - ${ubQ} шт`);L.push(`- Ціна U-блоку - ${fmt(ubR)} грн/шт`);n++;}
    if(adh.enabled&&adhQ>0){L.push(`${n}). ${adhO.name} - ${adhQ} ${declBag(adhQ)}`);L.push(`- Ціна - ${fmt(adhR)} грн/мішок`);}
    L.push(`Доставка - ${fmt(delivN)} грн/рейс (${delivType})`);L.push("");L.push(`Разом до оплати: ${fmt(fullRnd)} грн.`);
    if(rozchep){L.push("");L.push("*У разі необхідності розчепу, він буде коштувати +2000 грн. до доставки");}
    return L.join("\n");
  };
  const bwhl=()=>{
    const L=[];L.push(delivCity);L.push("");let n=1;
    if(b1.enabled&&b1B&&b1p>0){L.push(`${n}). ${b1B.width}x${b1B.height}x${b1B.length} мм ${b1.type} - ${b1m} м³ або ${b1p} ${declPallet(b1p)}`);L.push(`- Ціна газобетонного блоку - ${fmt(b1w)} грн/м³`);n++;}
    if(b2.enabled&&b2B&&b2p>0){L.push(`${n}). ${b2B.width}x${b2B.height}x${b2B.length} мм ${b2.type} - ${b2m} м³ або ${b2p} ${declPallet(b2p)}`);L.push(`- Ціна газобетонного блоку - ${fmt(b2w)} грн/м³`);n++;}
    if(b3.enabled&&b3B&&b3p>0){L.push(`${n}). ${b3B.width}x${b3B.height}x${b3B.length} мм ${b3.type} - ${b3m} м³ або ${b3p} ${declPallet(b3p)}`);L.push(`- Ціна газобетонного блоку - ${fmt(b3w)} грн/м³`);n++;}
    if(ub.enabled&&ubBl&&ubQ>0){L.push(`${n}). U-блок ${ubBl.width}x${ubBl.height}x${ubBl.length} мм - ${ubQ} шт`);L.push(`- Ціна U-блоку - ${fmt(ubW)} грн/шт`);n++;}
    if(adh.enabled&&adhQ>0){const s=Math.round(adhW*adhQ);L.push(`${n}). ${adhO.name} - ${adhQ} ${declBag(adhQ)}`);L.push(`- Ціна - ${fmt(adhW)} грн/мішок. Сума за клей: ${fmt(s)} грн`);}
    L.push(`Доставка - ${fmt(delivN)} грн/рейс (${delivType})`);L.push("");L.push(`Разом до оплати: ${fmt(Math.round(whlTotal))} грн.`);
    return L.join("\n");
  };
  const bdlr=()=>{
    const L=[];L.push(delivCity);L.push("");let n=1;
    if(b1.enabled&&b1B&&b1p>0){L.push(`${n}). ${b1B.width}x${b1B.height}x${b1B.length} мм ${b1.type} - ${b1m} м³ або ${b1p} ${declPallet(b1p)}`);n++;}
    if(b2.enabled&&b2B&&b2p>0){L.push(`${n}). ${b2B.width}x${b2B.height}x${b2B.length} мм ${b2.type} - ${b2m} м³ або ${b2p} ${declPallet(b2p)}`);n++;}
    if(b3.enabled&&b3B&&b3p>0){L.push(`${n}). ${b3B.width}x${b3B.height}x${b3B.length} мм ${b3.type} - ${b3m} м³ або ${b3p} ${declPallet(b3p)}`);n++;}
    if(ub.enabled&&ubBl&&ubQ>0){L.push(`${n}). U-блок ${ubBl.width}x${ubBl.height}x${ubBl.length} мм - ${ubQ} шт`);n++;}
    if(adh.enabled&&adhQ>0){L.push(`${n}). ${adhO.name} - ${adhQ} ${declBag(adhQ)}`);}
    L.push("");L.push(`Разом до оплати: ${fmt(fullRnd)} грн.`);
    return L.join("\n");
  };

  const tFull=bfull(),tWhl=bwhl(),tDlr=bdlr();
  const ts=()=>new Date().toLocaleString("uk-UA",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
  const doSave=(label,text,amount,setSv)=>{const e={id:Date.now(),ts:ts(),label,text,amount};saveH([...history,e]);setSv(true);setTimeout(()=>setSv(false),2000);};
  const doCopy=(text,setCp)=>{const done=()=>{setCp(true);setTimeout(()=>setCp(false),2000);};if(navigator.clipboard?.writeText)navigator.clipboard.writeText(text).then(done).catch(()=>{fb(text);done();});else{fb(text);done();}};
  const doCpH=(id,text)=>{const done=()=>{setCpH(p=>({...p,[id]:true}));setTimeout(()=>setCpH(p=>({...p,[id]:false})),2000);};if(navigator.clipboard?.writeText)navigator.clipboard.writeText(text).then(done).catch(()=>{fb(text);done();});else{fb(text);done();}};
  const fb=(t)=>{const ta=document.createElement("textarea");ta.value=t;ta.style.cssText="position:fixed;opacity:0";document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand("copy");}catch{}document.body.removeChild(ta);};
  const updUbH=(v)=>{const ws=[...new Set(U_BLOCKS.filter(b=>String(b.height)===v).map(b=>b.width))].sort((a,b)=>a-b);setUb(p=>({...p,height:v,width:ws.includes(Number(p.width))?p.width:String(ws[0]??"")}));};

  const lastF=[...history].reverse().find(h=>h.label==="full");
  const lastW=[...history].reverse().find(h=>h.label==="wholesale");
  const earned=(lastF&&lastW)?lastF.amount-lastW.amount:null;
  const tc=totPal===0?"#9ca3af":totPal<10?"#f59e0b":totPal<=12?"#22c55e":"#6366f1";
  const tl=tierLabel(totPal);

  return(
    <div style={S.page}><div style={S.card}>
      <div style={S.header}>
        <div style={S.headerLabel}>Калькулятор</div>
        <div style={S.headerTitle}>Газобетонні блоки Стоунлайт</div>
        <div style={S.headerSub}>Завод Бровари · Роздріб / Опт / Доставка</div>
      </div>

      <div style={S.form}>
        {/* VC1 повна сітка */}
        <VcBox title="Розрахунок об'єму — основний блок" widths={ALL_WIDTHS} width={vc1.width} onWidth={v=>setVc1(p=>({...p,width:v}))} m3input={vc1.m3input} onM3={v=>setVc1(p=>({...p,m3input:v}))} m3perPallet={vc1B?.m3perPallet} pallets={vc1p} exactM3={vc1e} />
        <Divider />

        {/* Блок 1 — основний */}
        <SecHeader title="Блок основний" tag="1" enabled={b1.enabled} onToggle={v=>setB1(p=>({...p,enabled:v}))} alwaysOn />
        {b1.enabled&&<div style={S.sb}>
          <TwoCol>
            <Row label="Тип блоку"><select value={b1.type} onChange={e=>setB1(p=>({...p,type:e.target.value,customRetail:"",customWholesale:""}))} style={S.input}>{BLOCK_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select></Row>
            <Row label="Ширина (мм)"><select value={b1sw} onChange={e=>setB1(p=>({...p,width:e.target.value}))} style={S.input}>{b1W.map(w=><option key={w} value={String(w)}>{w} мм</option>)}</select></Row>
          </TwoCol>
          <div style={S.priceInfoRow}>
            <span>Роздріб: <strong>{fmt(tiered.retail)} грн/м³</strong></span>
            <span>Опт: <strong>{fmt(tiered.wholesale)} грн/м³</strong></span>
            <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:tc}}>📦 {totPal>0?`${totPal} піддонів`:"—"} · {tl}</span>
          </div>
          <TwoCol>
            <Row label="Своя роздрібна"><PriceOverride value={b1.customRetail} onChange={v=>setB1(p=>({...p,customRetail:v}))} placeholder={fmt(tiered.retail)} /></Row>
            <Row label="Своя оптова"><PriceOverride value={b1.customWholesale} onChange={v=>setB1(p=>({...p,customWholesale:v}))} placeholder={fmt(tiered.wholesale)} /></Row>
          </TwoCol>
          {b1B&&b1p>0&&<CalcHint>{b1p} {declPallet(b1p)} × {b1B.m3perPallet} м³ = <strong>{b1m} м³</strong></CalcHint>}
        </div>}
        <Divider />

        {/* Блок 2 — стіновий */}
        <SecHeader title="Блок стіновий" tag="2" enabled={b2.enabled} onToggle={v=>setB2(p=>({...p,enabled:v}))} />
        {b2.enabled&&<BlockPanel block={b2} setBlock={setB2} vc={vc2} setVc={setVc2} vcWidths={MAIN_WIDTHS} vcBlock={vc2B} vcPallets={vc2p} vcExactM3={vc2e} bWidths={b2W} bSafeW={b2sw} bBlock={b2B} bPallets={b2p} bM3={b2m} tiered={tiered} totalGasoPallets={totPal} vcTitle="Розрахунок об'єму — стіновий блок" />}
        <Divider />

        {/* Блок 3 — перегородковий */}
        <SecHeader title="Блок перегородковий" tag="3" enabled={b3.enabled} onToggle={v=>setB3(p=>({...p,enabled:v}))} />
        {b3.enabled&&<BlockPanel block={b3} setBlock={setB3} vc={vc3} setVc={setVc3} vcWidths={PARTITION_WIDTHS} vcBlock={vc3B} vcPallets={vc3p} vcExactM3={vc3e} bWidths={b3W} bSafeW={b3sw} bBlock={b3B} bPallets={b3p} bM3={b3m} tiered={tiered} totalGasoPallets={totPal} vcTitle="Розрахунок об'єму — перегородка" />}
        <Divider />

        {/* U-блоки */}
        <SecHeader title="U-блоки" tag="4" enabled={ub.enabled} onToggle={v=>setUb(p=>({...p,enabled:v}))} />
        {ub.enabled&&<div style={S.sb}>
          <TwoCol>
            <Row label="Висота (мм)"><select value={ub.height} onChange={e=>updUbH(e.target.value)} style={S.input}>{ubH.map(h=><option key={h} value={String(h)}>{h} мм</option>)}</select></Row>
            <Row label="Ширина (мм)"><select value={ub.width} onChange={e=>setUb(p=>({...p,width:e.target.value}))} style={S.input}>{ubWH.map(w=><option key={w} value={String(w)}>{w} мм</option>)}</select></Row>
          </TwoCol>
          {ubBl&&<div style={S.priceInfoRow}><span>Роздріб: <strong>{fmt(ubBl.price)} грн/шт</strong></span><span>Опт: <strong>{fmt(ubBl.wholesalePrice)} грн/шт</strong></span></div>}
          <TwoCol>
            <Row label="Своя роздрібна"><PriceOverride value={ub.customRetail} onChange={v=>setUb(p=>({...p,customRetail:v}))} placeholder={ubBl?fmt(ubBl.price):""} /></Row>
            <Row label="Своя оптова"><PriceOverride value={ub.customWholesale} onChange={v=>setUb(p=>({...p,customWholesale:v}))} placeholder={ubBl?fmt(ubBl.wholesalePrice):""} /></Row>
          </TwoCol>
          <Row label="Кількість (шт)"><div style={{display:"flex",alignItems:"center",gap:6}}><input type="number" inputMode="numeric" value={ub.qty} min={1} step={1} onChange={e=>setUb(p=>({...p,qty:e.target.value}))} style={{...S.input,flex:1}} /><span style={{fontSize:12,color:"#6b7280"}}>шт</span></div></Row>
        </div>}
        <Divider />

        {/* Клей */}
        <SecHeader title="Клей для кладки" tag="5" enabled={adh.enabled} onToggle={v=>setAdh(p=>({...p,enabled:v}))} />
        {adh.enabled&&<div style={S.sb}>
          <Row label="Вид клею"><select value={adh.adhesiveId} onChange={e=>setAdh(p=>({...p,adhesiveId:e.target.value,customRetail:"",customWholesale:""}))} style={S.input}>{ADHESIVES.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></Row>
          <div style={S.priceInfoRow}><span>Роздріб: <strong>{adhO.retailPrice} грн/мішок</strong></span><span>Опт: <strong>{adhO.wholesalePrice} грн/мішок</strong></span></div>
          <TwoCol>
            <Row label="Своя роздрібна"><PriceOverride value={adh.customRetail} onChange={v=>setAdh(p=>({...p,customRetail:v}))} placeholder={String(adhO.retailPrice)} /></Row>
            <Row label="Своя оптова"><PriceOverride value={adh.customWholesale} onChange={v=>setAdh(p=>({...p,customWholesale:v}))} placeholder={String(adhO.wholesalePrice)} /></Row>
          </TwoCol>
          <Row label="Кількість мішків">
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <input type="number" inputMode="numeric" value={adhQtyOvr!==""?adhQtyOvr:adhAuto} min={0} step={1} onChange={e=>setAdhQtyOvr(e.target.value)} style={{...S.input,flex:1}} />
              <span style={{fontSize:12,color:"#6b7280"}}>міш.</span>
              {adhQtyOvr!==""&&<button onClick={()=>setAdhQtyOvr("")} style={{padding:"7px 12px",fontSize:13,borderRadius:7,border:"1px solid #d1d5db",background:"#f3f4f6",cursor:"pointer"}}>↺</button>}
            </div>
            <div style={{fontSize:11,color:"#9ca3af",marginTop:3}}>{adhQtyOvr!==""?`Авто: ${adhAuto} міш.`:"Авто (1 м³ = 1 мішок)"}</div>
          </Row>
        </div>}
        <Divider />

        {/* Доставка + розчеп */}
        <div style={{paddingTop:2}}>
          <div style={S.sectionTitle}>Доставка</div>
          <div style={S.sb}>
            <Row label="Місто / напрямок"><input type="text" value={delivCity} placeholder="напр. Бровари - Троєщина" onChange={e=>setDelivCity(e.target.value)} style={S.input} /></Row>
            <TwoCol>
              <Row label="Тип транспорту"><input type="text" value={delivType} placeholder="маніпулятор" onChange={e=>setDelivType(e.target.value)} style={S.input} /></Row>
              <Row label="Вартість (грн)"><div style={{display:"flex",alignItems:"center",gap:6}}><input type="number" inputMode="numeric" value={delivCost} min={0} step={100} onChange={e=>setDelivCost(e.target.value)} style={{...S.input,flex:1}} /><span style={{fontSize:12,color:"#6b7280"}}>грн</span></div></Row>
            </TwoCol>
            <div style={{display:"flex",alignItems:"center",gap:10,marginTop:6,paddingTop:8,borderTop:"1px solid #e5e7eb"}}>
              <div style={{width:48,height:26,borderRadius:13,background:rozchep?"#2563a8":"#d1d5db",position:"relative",cursor:"pointer"}} onClick={()=>setRozchep(v=>!v)}>
                <div style={{position:"absolute",top:3,left:rozchep?23:3,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}} />
              </div>
              <span style={{fontSize:14,fontWeight:600,color:"#374151",flex:1}}>Розчеп</span>
              <span style={{fontSize:13,color:"#6b7280"}}>{rozchep?"Так":"Ні"}</span>
              </div>
          </div>
        </div>
      </div>

      {/* Results */}
      {hasAny&&(
        <div style={S.result}>
          <div style={S.statsRow}>
            {b1.enabled&&b1p>0&&<Stat label={`${b1.type} ${b1sw}мм`} value={`${b1m} м³`} />}
            {b2.enabled&&b2p>0&&<Stat label={`${b2.type} ${b2sw}мм`} value={`${b2m} м³`} />}
            {b3.enabled&&b3p>0&&<Stat label={`${b3.type} ${b3sw}мм`} value={`${b3m} м³`} />}
            {gasoActive>=2&&<Stat label="Разом ГБ" value={`${totGasoM3} м³`} />}
            {ub.enabled&&ubQ>0&&<Stat label="U-блок" value={`${ubQ} шт`} />}
            {adh.enabled&&adhQ>0&&<Stat label="Клей" value={`${adhQ} ${declBag(adhQ)}`} />}
            <Stat label="Разом (роздріб)" value={`${fmt(fullRnd)} грн`} accent />
          </div>
          <ResultBlock label="📦 Газобетон з доставкою" amount={fmt(fullRnd)} text={tFull} color="#2563a8" onCopy={()=>doCopy(tFull,setCp0)} copied={cp0} onSave={()=>doSave("full",tFull,fullRnd,setSv0)} saved={sv0} />
          <div style={S.hr} />
          <ResultBlock label="📋 Для мене" amount={fmt(fullRnd)} text={tDlr} color="#2563a8" onCopy={()=>doCopy(tDlr,setCp2)} copied={cp2} onSave={()=>doSave("dealer",tDlr,fullRnd,setSv2)} saved={sv2} />
          <div style={S.hr} />
          <ResultBlock label="📦 Газобетон + 🧴 Клей + доставка" amount={fmt(Math.round(whlTotal))} text={tWhl} color="#2563a8" onCopy={()=>doCopy(tWhl,setCp1)} copied={cp1} onSave={()=>doSave("wholesale",tWhl,Math.round(whlTotal),setSv1)} saved={sv1} />
        </div>
      )}

      {/* History */}
      {history.length>0&&(
        <div style={S.histCard}>
          <div style={S.histHeader}>
            <span>📋 Записи замовлень</span>
            {clrOk?(
              <span style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:12,color:"#ef4444"}}>Очистити всі?</span>
                <button onClick={()=>{saveH([]);setClrOk(false);}} style={{...S.clearBtn,background:"#ef4444"}}>Так</button>
                <button onClick={()=>setClrOk(false)} style={{...S.clearBtn,background:"#6b7280"}}>Ні</button>
              </span>
            ):(
              <button onClick={()=>setClrOk(true)} style={S.clearBtn}>Очистити</button>
            )}
          </div>
          {history.map(e=>{
            const isCp=!!cpH[e.id];
            return(
              <div key={e.id} style={S.histEntry}>
                <div style={S.histMeta}>
                  <span style={S.histTag(e.label)}>{e.label==="full"?"📦 Газобетон з дост.":e.label==="wholesale"?"📦+🧴 Опт+клей+дост.":"📋 Для мене"}</span>
                  <span style={{fontSize:11,color:"#9ca3af"}}>{e.ts}</span>
                  <span style={{fontWeight:700,color:"#1a3a5c",fontSize:13}}>{fmt(e.amount)} грн</span>
                  <button onClick={()=>saveH(history.filter(h=>h.id!==e.id))} style={{marginLeft:"auto",fontSize:11,padding:"4px 10px",borderRadius:5,border:"1px solid #fca5a5",background:"#fff0f0",color:"#ef4444",cursor:"pointer"}}>✕</button>
                </div>
                <div style={S.histText}>{e.text}</div>
                <button onClick={()=>doCpH(e.id,e.text)} style={{...S.histCopyBtn,background:isCp?"#22c55e":"#2563a8"}}>{isCp?"✓ Скопійовано!":"Копіювати"}</button>
              </div>
            );
          })}
        </div>
      )}

      {/* Підсумок */}
      {lastF&&lastW&&(
        <div style={S.profitSection}>
          <div style={S.profitBox}>
            <div style={S.profitTitle}>💰 Підсумок по останньому замовленню</div>
            <div style={S.profitRow}>
              <span>Заробив:</span>
              <span style={{...S.profitAmt,color:earned>=0?"#4ade80":"#f87171"}}>{fmt(earned)} грн</span>
            </div>
          </div>
        </div>
      )}
    </div></div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
