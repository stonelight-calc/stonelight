<script>
// ── PWA Manifest (inline) ──────────────────────────────────────────────────
const manifestData = {
  name: "Стоунлайт · Калькулятор",
  short_name: "Стоунлайт",
  description: "Калькулятор газобетонних блоків Стоунлайт",
  start_url: "./",
  display: "standalone",
  background_color: "#f0f4f8",
  theme_color: "#1a3a5c",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%231a3a5c'/><text x='96' y='130' font-size='100' text-anchor='middle' fill='white'>🧱</text></svg>`), sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%231a3a5c'/><text x='256' y='360' font-size='280' text-anchor='middle' fill='white'>🧱</text></svg>`), sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
document.getElementById('manifest-placeholder').href = URL.createObjectURL(blob);

// ── Service Worker (офлайн підтримка) ─────────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'stonelight-v1';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './index.html'])));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('./index.html'))));
});
  `;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>

// ── Helpers ────────────────────────────────────────────────────────────────
function getTieredPrices(p){
  if(p>0&&p<10) return{retail:3650,wholesale:3550};
  if(p>=10&&p<=12) return{retail:3500,wholesale:3400};
  return{retail:3430,wholesale:3350};
}
function tierLabel(n){
  if(n===0)return"—";if(n<10)return"< 10 піддонів";if(n<=12)return"10–12 піддонів";return"13+ піддонів";
}
function fmt(n){return Math.round(n).toLocaleString("uk-UA");}
function declPallet(n){const a=Math.abs(n),m10=a%10,m100=a%100;if(m100>=11&&m100<=14)return"піддонів";if(m10===1)return"піддон";if(m10>=2&&m10<=4)return"піддони";return"піддонів";}
function declBag(n){const a=Math.abs(n),m10=a%10,m100=a%100;if(m100>=11&&m100<=14)return"мішків";if(m10===1)return"мішок";if(m10>=2&&m10<=4)return"мішки";return"мішків";}
function roundPallets(r){return Math.round(r);}
function resolvePrice(cs,def){const v=parseFloat(cs);return(!isNaN(v)&&v>0)?v:def;}

// ── localStorage persistence (замість window.storage) ─────────────────────
const LS_KEY="stonelight_history_v1";
function loadHistory(){try{const s=localStorage.getItem(LS_KEY);return s?JSON.parse(s):[];}catch{return[];}}
function persistHistory(arr){try{localStorage.setItem(LS_KEY,JSON.stringify(arr));}catch{}}

// ── Components ──────────────────────────────────────────────────────────────
function ResultBlock({label,amount,text,color,onCopy,copied,onSave,saved}){

    <div style={{marginBottom:4}}>
      <div style={S.resultBlockLabel}>{label} · <span style={{color:"#fff"}}>{amount} грн</span></div>

function PriceOverride({value,onChange,placeholder}){

    <div style={{display:"flex",alignItems:"center",gap:6}}>

}

}
function SectionHeader({title,tag,enabled,onToggle,alwaysOn}){

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const [vc1,setVc1]=useState({width:"300",m3input:"39"});
  const [vc2,setVc2]=useState({width:"100",m3input:"4"});
  const [b1,setB1]=useState({enabled:true,type:"D500",width:"300",customRetail:"",customWholesale:""});
  const [b2,setB2]=useState({enabled:false,type:"D500",width:"100",customRetail:"",customWholesale:""});
  const [ub,setUb]=useState({enabled:false,width:"300",height:"200",qty:"10",customRetail:"",customWholesale:""});
  const [adh,setAdh]=useState({enabled:false,adhesiveId:"shpaten",customRetail:"",customWholesale:""});
  const [adhQtyOverride,setAdhQtyOverride]=useState("");
  const [deliveryCity,setDeliveryCity]=useState("Бровари - Боярка");
  const [deliveryCost,setDeliveryCost]=useState("12000");
  const [deliveryType,setDeliveryType]=useState("маніпулятор");
  const [history,setHistory]=useState(()=>loadHistory());
  const [saved0,setSaved0]=useState(false);
  const [saved1,setSaved1]=useState(false);
  const [saved2,setSaved2]=useState(false);
  const [copied0,setCopied0]=useState(false);
  const [copied1,setCopied1]=useState(false);
  const [copied2,setCopied2]=useState(false);
  const [copiedHistory,setCopiedHistory]=useState({});
  const [clearConfirm,setClearConfirm]=useState(false);

  const saveHistory=(next)=>{setHistory(next);persistHistory(next);};

  // VC1
  const vc1Block=BLOCKS.find(b=>b.type===b1.type&&b.width===Number(vc1.width));
  const vc1M3=parseFloat(vc1.m3input)||0;
  const vc1Pallets=roundPallets(vc1Block&&vc1M3>0?vc1M3/vc1Block.m3perPallet:0);
  const vc1ExactM3=vc1Block&&vc1Pallets>0?+(vc1Block.m3perPallet*vc1Pallets).toFixed(3):0;
  // VC2
  const vc2Block=BLOCKS.find(b=>b.type===b2.type&&b.width===Number(vc2.width));
  const vc2M3=parseFloat(vc2.m3input)||0;
  const vc2Pallets=roundPallets(vc2Block&&vc2M3>0?vc2M3/vc2Block.m3perPallet:0);
  const vc2ExactM3=vc2Block&&vc2Pallets>0?+(vc2Block.m3perPallet*vc2Pallets).toFixed(3):0;
  // B1
  const b1Widths=useMemo(()=>[...new Set(BLOCKS.filter(b=>b.type===b1.type).map(b=>b.width))].sort((a,b)=>a-b),[b1.type]);
  const b1SafeW=b1Widths.includes(Number(b1.width))?b1.width:String(b1Widths[0]??"");
  const b1Block=BLOCKS.find(b=>b.type===b1.type&&b.width===Number(b1SafeW));
  const b1M3=vc1ExactM3, b1Pallets=vc1Pallets;
  // B2
  const b2Widths=useMemo(()=>[...new Set(BLOCKS.filter(b=>b.type===b2.type).map(b=>b.width))].sort((a,b)=>a-b),[b2.type]);
  const b2SafeW=b2Widths.includes(Number(b2.width))?b2.width:String(b2Widths[0]??"");
  const b2Block=BLOCKS.find(b=>b.type===b2.type&&b.width===Number(b2SafeW));
  const b2M3=vc2ExactM3, b2Pallets=vc2Pallets;
  // Тир
  const totalGasoPallets=(b1.enabled?b1Pallets:0)+(b2.enabled?b2Pallets:0);
  const tiered=getTieredPrices(totalGasoPallets);
  const tierBadgeColor=totalGasoPallets===0?"#9ca3af":totalGasoPallets<10?"#f59e0b":totalGasoPallets<=12?"#22c55e":"#6366f1";
  const b1Retail=resolvePrice(b1.customRetail,tiered.retail);
  const b1Wholesale=resolvePrice(b1.customWholesale,tiered.wholesale);
  const b2Retail=resolvePrice(b2.customRetail,tiered.retail);
  const b2Wholesale=resolvePrice(b2.customWholesale,tiered.wholesale);
  // UB
  const ubUniqueHeights=[...new Set(U_BLOCKS.map(b=>b.height))].sort((a,b)=>a-b);
  const ubWidthsForH=[...new Set(U_BLOCKS.filter(b=>String(b.height)===ub.height).map(b=>b.width))].sort((a,b)=>a-b);
  const ubBlock=U_BLOCKS.find(b=>String(b.width)===ub.width&&String(b.height)===ub.height);
  const ubQty=parseFloat(ub.qty)||0;
  const ubRetail=resolvePrice(ub.customRetail,ubBlock?.price??0);
  const ubWholesale=resolvePrice(ub.customWholesale,ubBlock?.wholesalePrice??0);
  // Adh
  const adhObj=ADHESIVES.find(a=>a.id===adh.adhesiveId)||ADHESIVES[0];
  const totalBlockM3=(b1.enabled?b1M3:0)+(b2.enabled?b2M3:0);
  const adhQtyAuto=totalBlockM3>0?Math.ceil(totalBlockM3):0;
  const adhQty=adhQtyOverride!==""?(parseFloat(adhQtyOverride)||0):adhQtyAuto;
  const adhRetail=resolvePrice(adh.customRetail,adhObj.retailPrice);
  const adhWholesale=resolvePrice(adh.customWholesale,adhObj.wholesalePrice);
  const deliveryCostNum=parseFloat(deliveryCost)||0;
  // Costs
  const fullRetailBlockCost=(b1.enabled&&b1Block?b1Retail*b1M3:0)+(b2.enabled&&b2Block?b2Retail*b2M3:0)+(ub.enabled&&ubBlock?ubRetail*ubQty:0);
  const fullTotal=fullRetailBlockCost+(adh.enabled?adhRetail*adhQty:0)+deliveryCostNum;
  const wholesaleBlockCost=(b1.enabled&&b1Block?b1Wholesale*b1M3:0)+(b2.enabled&&b2Block?b2Wholesale*b2M3:0)+(ub.enabled&&ubBlock?ubWholesale*ubQty:0);
  const wholesaleCombined=wholesaleBlockCost+(adh.enabled?adhWholesale*adhQty:0)+deliveryCostNum;
  const hasAnyItem=b1.enabled||b2.enabled||ub.enabled||adh.enabled;
  const roundTo10=(n)=>{const u=Math.round(n)%10,base=Math.round(n)-u;return u>=8?base+10:base;};
  const fullTotalRounded=roundTo10(fullTotal);
  const showTotalGB=b1.enabled&&b1Pallets>0&&b2.enabled&&b2Pallets>0;
  const totalGasoM3=+((b1.enabled&&b1Pallets>0?b1M3:0)+(b2.enabled&&b2Pallets>0?b2M3:0)).toFixed(3);
  const tierInfoStr=totalGasoPallets===0?"—":totalGasoPallets<10?"< 10 піддонів":totalGasoPallets<=12?"10–12 піддонів":"13+ піддонів";

  const buildFullText=()=>{
    const L=[];L.push("Виробник Стоунлайт");L.push("");L.push(deliveryCity);L.push("");
    let n=1;
    if(b1.enabled&&b1Block&&b1Pallets>0){L.push(`${n}). ${b1Block.width}x${b1Block.height}x${b1Block.length} мм ${b1.type} - ${b1M3} м³ або ${b1Pallets} ${declPallet(b1Pallets)}`);L.push(`- Ціна газобетонного блоку - ${fmt(b1Retail)} грн/м³`);n++;}
    if(b2.enabled&&b2Block&&b2Pallets>0){L.push(`${n}). ${b2Block.width}x${b2Block.height}x${b2Block.length} мм ${b2.type} - ${b2M3} м³ або ${b2Pallets} ${declPallet(b2Pallets)}`);L.push(`- Ціна газобетонного блоку - ${fmt(b2Retail)} грн/м³`);n++;}
    if(ub.enabled&&ubBlock&&ubQty>0){L.push(`${n}). U-блок ${ubBlock.width}x${ubBlock.height}x${ubBlock.length} мм - ${ubQty} шт`);L.push(`- Ціна U-блоку - ${fmt(ubRetail)} грн/шт`);n++;}
    if(adh.enabled&&adhQty>0){L.push(`${n}). ${adhObj.name} - ${adhQty} ${declBag(adhQty)}`);L.push(`- Ціна - ${fmt(adhRetail)} грн/мішок`);}
    L.push(`Доставка - ${fmt(deliveryCostNum)} грн/рейс (${deliveryType})`);L.push("");L.push(`Разом до оплати: ${fmt(fullTotalRounded)} грн.`);
    return L.join("\n");
  };
  const buildWholesaleText=()=>{
    const L=[];L.push(deliveryCity);L.push("");let n=1;
    if(b1.enabled&&b1Block&&b1Pallets>0){L.push(`${n}). ${b1Block.width}x${b1Block.height}x${b1Block.length} мм ${b1.type} - ${b1M3} м³ або ${b1Pallets} ${declPallet(b1Pallets)}`);L.push(`- Ціна газобетонного блоку - ${fmt(b1Wholesale)} грн/м³`);n++;}
    if(b2.enabled&&b2Block&&b2Pallets>0){L.push(`${n}). ${b2Block.width}x${b2Block.height}x${b2Block.length} мм ${b2.type} - ${b2M3} м³ або ${b2Pallets} ${declPallet(b2Pallets)}`);L.push(`- Ціна газобетонного блоку - ${fmt(b2Wholesale)} грн/м³`);n++;}
    if(ub.enabled&&ubBlock&&ubQty>0){L.push(`${n}). U-блок ${ubBlock.width}x${ubBlock.height}x${ubBlock.length} мм - ${ubQty} шт`);L.push(`- Ціна U-блоку - ${fmt(ubWholesale)} грн/шт`);n++;}
    if(adh.enabled&&adhQty>0){const s=Math.round(adhWholesale*adhQty);L.push(`${n}). ${adhObj.name} - ${adhQty} ${declBag(adhQty)}`);L.push(`- Ціна - ${fmt(adhWholesale)} грн/мішок. Сума за клей: ${fmt(s)} грн`);}
    L.push(`Доставка - ${fmt(deliveryCostNum)} грн/рейс (${deliveryType})`);L.push("");L.push(`Разом до оплати: ${fmt(Math.round(wholesaleCombined))} грн.`);
    return L.join("\n");
  };
  const buildDealerText=()=>{
    const L=[];L.push(deliveryCity);L.push("");let n=1;
    if(b1.enabled&&b1Block&&b1Pallets>0){L.push(`${n}). ${b1Block.width}x${b1Block.height}x${b1Block.length} мм ${b1.type} - ${b1M3} м³ або ${b1Pallets} ${declPallet(b1Pallets)}`);n++;}
    if(b2.enabled&&b2Block&&b2Pallets>0){L.push(`${n}). ${b2Block.width}x${b2Block.height}x${b2Block.length} мм ${b2.type} - ${b2M3} м³ або ${b2Pallets} ${declPallet(b2Pallets)}`);n++;}
    if(ub.enabled&&ubBlock&&ubQty>0){L.push(`${n}). U-блок ${ubBlock.width}x${ubBlock.height}x${ubBlock.length} мм - ${ubQty} шт`);n++;}
    if(adh.enabled&&adhQty>0){L.push(`${n}). ${adhObj.name} - ${adhQty} ${declBag(adhQty)}`);}
    L.push("");L.push(`Разом до оплати: ${fmt(fullTotalRounded)} грн.`);
    return L.join("\n");
  };

  const fullText=buildFullText(),wholesaleText=buildWholesaleText(),dealerText=buildDealerText();
  const timestamp=()=>new Date().toLocaleString("uk-UA",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
  const doSave=(label,text,amount,setSaved)=>{
    const entry={id:Date.now(),ts:timestamp(),label,text,amount};
    saveHistory([...history,entry]);setSaved(true);setTimeout(()=>setSaved(false),2000);
  };
  const doCopy=(text,setCopied)=>{
    const done=()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);};
    if(navigator.clipboard?.writeText)navigator.clipboard.writeText(text).then(done).catch(()=>{fb(text);done();});
    else{fb(text);done();}
  };
  const doCopyHist=(id,text)=>{
    const done=()=>{setCopiedHistory(p=>({...p,[id]:true}));setTimeout(()=>setCopiedHistory(p=>({...p,[id]:false})),2000);};
    if(navigator.clipboard?.writeText)navigator.clipboard.writeText(text).then(done).catch(()=>{fb(text);done();});
    else{fb(text);done();}
  };
  const fb=(text)=>{const ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;opacity:0";document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand("copy");}catch{}document.body.removeChild(ta);};
  const updateB1Type=(v)=>setB1(p=>({...p,type:v,customRetail:"",customWholesale:""}));
  const updateB2Type=(v)=>setB2(p=>({...p,type:v,customRetail:"",customWholesale:""}));
  const updateUbHeight=(v)=>{const ws=[...new Set(U_BLOCKS.filter(b=>String(b.height)===v).map(b=>b.width))].sort((a,b)=>a-b);setUb(p=>({...p,height:v,width:ws.includes(Number(p.width))?p.width:String(ws[0]??"")}));};
  const lastFull=[...history].reverse().find(h=>h.label==="full");
  const lastWholesale=[...history].reverse().find(h=>h.label==="wholesale");
  const lastEarned=(lastFull&&lastWholesale)?lastFull.amount-lastWholesale.amount:null;

  return(
    <div style={S.page}>
      <div style={S.card}>
        <div style={S.header}>
          <div style={S.headerLabel}>Калькулятор</div>
          <div style={S.headerTitle}>Газобетонні блоки Стоунлайт</div>
          <div style={S.headerSub}>Завод Бровари · Роздріб / Опт / Доставка</div>
        </div>

        <div style={S.form}>
          {/* VC1 */}
          <VcBox title="Розрахунок об'єму — основний блок" widths={MAIN_WIDTHS} width={vc1.width} onWidth={v=>setVc1(p=>({...p,width:v}))} m3input={vc1.m3input} onM3={v=>setVc1(p=>({...p,m3input:v}))} m3perPallet={vc1Block?.m3perPallet} pallets={vc1Pallets} exactM3={vc1ExactM3} />
          <Divider />

          {/* Block 1 */}
          <SectionHeader title="Блок основний" tag="1" enabled={b1.enabled} onToggle={v=>setB1(p=>({...p,enabled:v}))} alwaysOn />
          {b1.enabled&&<div style={S.sb}>
            <TwoCol>
              <Row label="Тип блоку"><select value={b1.type} onChange={e=>updateB1Type(e.target.value)} style={S.input}>{BLOCK_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select></Row>
              <Row label="Ширина (мм)"><select value={b1SafeW} onChange={e=>setB1(p=>({...p,width:e.target.value}))} style={S.input}>{b1Widths.map(w=><option key={w} value={String(w)}>{w} мм</option>)}</select></Row>
            </TwoCol>
            <div style={S.priceInfoRow}>
              <span>Роздріб: <strong>{fmt(tiered.retail)} грн/м³</strong></span>
              <span>Опт: <strong>{fmt(tiered.wholesale)} грн/м³</strong></span>
              <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:tierBadgeColor}}>📦 {totalGasoPallets>0?`${totalGasoPallets} піддонів`:"—"} · {tierLabel(totalGasoPallets)}</span>
            </div>
            <TwoCol>
              <Row label="Своя роздрібна ціна"><PriceOverride value={b1.customRetail} onChange={v=>setB1(p=>({...p,customRetail:v}))} placeholder={fmt(tiered.retail)} /></Row>
              <Row label="Своя оптова ціна"><PriceOverride value={b1.customWholesale} onChange={v=>setB1(p=>({...p,customWholesale:v}))} placeholder={fmt(tiered.wholesale)} /></Row>
            </TwoCol>
            {b1Block&&b1Pallets>0&&<CalcHint>{b1Pallets} {declPallet(b1Pallets)} × {b1Block.m3perPallet} м³ = <strong>{b1M3} м³</strong></CalcHint>}
          </div>}
          <Divider />

          {/* Block 2 */}
          <SectionHeader title="Блок перегородковий" tag="2" enabled={b2.enabled} onToggle={v=>setB2(p=>({...p,enabled:v}))} />
          {b2.enabled&&<>
            <div style={{marginTop:12}}>
              <VcBox title="Розрахунок об'єму — перегородка" widths={PARTITION_WIDTHS} width={vc2.width} onWidth={v=>setVc2(p=>({...p,width:v}))} m3input={vc2.m3input} onM3={v=>setVc2(p=>({...p,m3input:v}))} m3perPallet={vc2Block?.m3perPallet} pallets={vc2Pallets} exactM3={vc2ExactM3} />
            </div>
            <div style={S.sb}>
              <TwoCol>
                <Row label="Тип блоку"><select value={b2.type} onChange={e=>updateB2Type(e.target.value)} style={S.input}>{BLOCK_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select></Row>
                <Row label="Ширина (мм)"><select value={b2SafeW} onChange={e=>setB2(p=>({...p,width:e.target.value}))} style={S.input}>{b2Widths.map(w=><option key={w} value={String(w)}>{w} мм</option>)}</select></Row>
              </TwoCol>
              <div style={S.priceInfoRow}>
                <span>Роздріб: <strong>{fmt(tiered.retail)} грн/м³</strong></span>
                <span>Опт: <strong>{fmt(tiered.wholesale)} грн/м³</strong></span>
                <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:tierBadgeColor}}>📦 {totalGasoPallets>0?`${totalGasoPallets} піддонів`:"—"} · {tierLabel(totalGasoPallets)}</span>
              </div>
              <TwoCol>
                <Row label="Своя роздрібна ціна"><PriceOverride value={b2.customRetail} onChange={v=>setB2(p=>({...p,customRetail:v}))} placeholder={fmt(tiered.retail)} /></Row>
                <Row label="Своя оптова ціна"><PriceOverride value={b2.customWholesale} onChange={v=>setB2(p=>({...p,customWholesale:v}))} placeholder={fmt(tiered.wholesale)} /></Row>
              </TwoCol>
              {b2Block&&b2Pallets>0&&<CalcHint>{b2Pallets} {declPallet(b2Pallets)} × {b2Block.m3perPallet} м³ = <strong>{b2M3} м³</strong></CalcHint>}
            </div>
          </>}
          <Divider />

          {/* U-blocks */}
          <SectionHeader title="U-блоки" tag="3" enabled={ub.enabled} onToggle={v=>setUb(p=>({...p,enabled:v}))} />
          {ub.enabled&&<div style={S.sb}>
            <TwoCol>
              <Row label="Висота (мм)"><select value={ub.height} onChange={e=>updateUbHeight(e.target.value)} style={S.input}>{ubUniqueHeights.map(h=><option key={h} value={String(h)}>{h} мм</option>)}</select></Row>
              <Row label="Ширина (мм)"><select value={ub.width} onChange={e=>setUb(p=>({...p,width:e.target.value}))} style={S.input}>{ubWidthsForH.map(w=><option key={w} value={String(w)}>{w} мм</option>)}</select></Row>
            </TwoCol>
            {ubBlock&&<div style={S.priceInfoRow}><span>Роздріб: <strong>{fmt(ubBlock.price)} грн/шт</strong></span><span>Опт: <strong>{fmt(ubBlock.wholesalePrice)} грн/шт</strong></span></div>}
            <TwoCol>
              <Row label="Своя роздрібна ціна"><PriceOverride value={ub.customRetail} onChange={v=>setUb(p=>({...p,customRetail:v}))} placeholder={ubBlock?fmt(ubBlock.price):""} /></Row>
              <Row label="Своя оптова ціна"><PriceOverride value={ub.customWholesale} onChange={v=>setUb(p=>({...p,customWholesale:v}))} placeholder={ubBlock?fmt(ubBlock.wholesalePrice):""} /></Row>
            </TwoCol>
            <Row label="Кількість (шт)">
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <input type="number" inputMode="numeric" value={ub.qty} min={1} step={1} onChange={e=>setUb(p=>({...p,qty:e.target.value}))} style={{...S.input,flex:1}} />
                <span style={{fontSize:12,color:"#6b7280"}}>шт</span>
              </div>
            </Row>
          </div>}
          <Divider />

          {/* Adhesive */}
          <SectionHeader title="Клей для кладки" tag="4" enabled={adh.enabled} onToggle={v=>setAdh(p=>({...p,enabled:v}))} />
          {adh.enabled&&<div style={S.sb}>
            <Row label="Вид клею"><select value={adh.adhesiveId} onChange={e=>setAdh(p=>({...p,adhesiveId:e.target.value,customRetail:"",customWholesale:""}))} style={S.input}>{ADHESIVES.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}</select></Row>
            <div style={S.priceInfoRow}><span>Роздріб: <strong>{adhObj.retailPrice} грн/мішок</strong></span><span>Опт: <strong>{adhObj.wholesalePrice} грн/мішок</strong></span></div>
            <TwoCol>
              <Row label="Своя роздрібна ціна"><PriceOverride value={adh.customRetail} onChange={v=>setAdh(p=>({...p,customRetail:v}))} placeholder={String(adhObj.retailPrice)} /></Row>
              <Row label="Своя оптова ціна"><PriceOverride value={adh.customWholesale} onChange={v=>setAdh(p=>({...p,customWholesale:v}))} placeholder={String(adhObj.wholesalePrice)} /></Row>
            </TwoCol>
            <Row label="Кількість мішків">
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <input type="number" inputMode="numeric" value={adhQtyOverride!==""?adhQtyOverride:adhQtyAuto} min={0} step={1} onChange={e=>setAdhQtyOverride(e.target.value)} style={{...S.input,flex:1}} />
                <span style={{fontSize:12,color:"#6b7280"}}>міш.</span>
                {adhQtyOverride!==""&&<button onClick={()=>setAdhQtyOverride("")} style={{padding:"7px 12px",fontSize:13,borderRadius:7,border:"1px solid #d1d5db",background:"#f3f4f6",cursor:"pointer"}}>↺</button>}
              </div>
              <div style={{fontSize:11,color:"#9ca3af",marginTop:3}}>{adhQtyOverride!==""?`Авто: ${adhQtyAuto} міш.`:"Авто (1 м³ = 1 мішок)"}</div>
            </Row>
          </div>}
          <Divider />

          {/* Delivery */}
          <div style={{paddingTop:2}}>
            <div style={S.sectionTitle}>Доставка</div>
            <div style={S.sb}>
              <Row label="Місто / напрямок"><input type="text" value={deliveryCity} placeholder="напр. Бровари - Троєщина" onChange={e=>setDeliveryCity(e.target.value)} style={S.input} /></Row>
              <TwoCol>
                <Row label="Тип транспорту"><input type="text" value={deliveryType} placeholder="маніпулятор" onChange={e=>setDeliveryType(e.target.value)} style={S.input} /></Row>
                <Row label="Вартість (грн)">
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <input type="number" inputMode="numeric" value={deliveryCost} min={0} step={100} onChange={e=>setDeliveryCost(e.target.value)} style={{...S.input,flex:1}} />
                    <span style={{fontSize:12,color:"#6b7280"}}>грн</span>
                  </div>
                </Row>
              </TwoCol>
            </div>
          </div>
        </div>

        {/* Results */}
        {hasAnyItem&&(
          <div style={S.result}>
            <div style={S.statsRow}>
              {b1.enabled&&b1Pallets>0&&<Stat label={`${b1.type} ${b1SafeW}мм`} value={`${b1M3} м³`} />}
              {b2.enabled&&b2Pallets>0&&<Stat label={`${b2.type} ${b2SafeW}мм`} value={`${b2M3} м³`} />}
              {showTotalGB&&<Stat label="Разом ГБ" value={`${totalGasoM3} м³`} subtle />}
              {ub.enabled&&ubQty>0&&<Stat label="U-блок" value={`${ubQty} шт`} />}
              {adh.enabled&&adhQty>0&&<Stat label="Клей" value={`${adhQty} ${declBag(adhQty)}`} />}
              <Stat label="Разом (роздріб)" value={`${fmt(fullTotalRounded)} грн`} accent />
            </div>
            <ResultBlock label="📦 Газобетон з доставкою" amount={fmt(fullTotalRounded)} text={fullText} color="#2563a8" onCopy={()=>doCopy(fullText,setCopied0)} copied={copied0} onSave={()=>doSave("full",fullText,fullTotalRounded,setSaved0)} saved={saved0} />
            <div style={S.hr} />
            <ResultBlock label="📋 Для мене" amount={fmt(fullTotalRounded)} text={dealerText} color="#2563a8" onCopy={()=>doCopy(dealerText,setCopied2)} copied={copied2} onSave={()=>doSave("dealer",dealerText,fullTotalRounded,setSaved2)} saved={saved2} />
            <div style={S.hr} />
            <ResultBlock label="📦 Газобетон + 🧴 Клей + доставка" amount={fmt(Math.round(wholesaleCombined))} text={wholesaleText} color="#2563a8" onCopy={()=>doCopy(wholesaleText,setCopied1)} copied={copied1} onSave={()=>doSave("wholesale",wholesaleText,Math.round(wholesaleCombined),setSaved1)} saved={saved1} />
          </div>
        )}

        {/* History */}
        {history.length>0&&(
          <div style={S.historyCard}>
            <div style={S.historyHeader}>
              <span>📋 Записи замовлень</span>
              {clearConfirm?(
                <span style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontSize:12,color:"#ef4444"}}>Очистити всі?</span>
                  <button onClick={()=>{saveHistory([]);setClearConfirm(false);}} style={{...S.clearBtn,background:"#ef4444"}}>Так</button>
                  <button onClick={()=>setClearConfirm(false)} style={{...S.clearBtn,background:"#6b7280"}}>Ні</button>
                </span>
              ):(
                <button onClick={()=>setClearConfirm(true)} style={S.clearBtn}>Очистити</button>
              )}
            </div>
            {history.map(entry=>{
              const isCopied=!!copiedHistory[entry.id];
              return(
                <div key={entry.id} style={S.historyEntry}>
                  <div style={S.historyEntryMeta}>
                    <span style={S.historyTag(entry.label)}>{entry.label==="full"?"📦 Газобетон з дост.":entry.label==="wholesale"?"📦+🧴 Опт+клей+дост.":"📋 Для мене"}</span>
                    <span style={{fontSize:11,color:"#9ca3af"}}>{entry.ts}</span>
                    <span style={{fontWeight:700,color:"#1a3a5c",fontSize:13}}>{fmt(entry.amount)} грн</span>
                    <button onClick={()=>saveHistory(history.filter(h=>h.id!==entry.id))} style={{marginLeft:"auto",fontSize:11,padding:"4px 10px",borderRadius:5,border:"1px solid #fca5a5",background:"#fff0f0",color:"#ef4444",cursor:"pointer"}}>✕</button>
                  </div>
                  <div style={S.historyText}>{entry.text}</div>
                  <button onClick={()=>doCopyHist(entry.id,entry.text)} style={{...S.histCopyBtn,background:isCopied?"#22c55e":"#2563a8"}}>{isCopied?"✓ Скопійовано!":"Копіювати"}</button>
                </div>
              );
            })}
          </div>
        )}

        {/* Підсумок */}
        {lastFull&&lastWholesale&&(
          <div style={S.profitSection}>
            <div style={S.profitBox}>
              <div style={S.profitTitle}>💰 Підсумок по останньому замовленню</div>
              <div style={S.profitRow}>
                <span>Заробив:</span>
                <span style={{...S.profitAmt,color:lastEarned>=0?"#4ade80":"#f87171"}}>{fmt(lastEarned)} грн</span>
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
